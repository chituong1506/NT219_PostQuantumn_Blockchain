x-chainlensapi-ref:
  &chainlensapi-def
  image: web3labs/epirus-free-api:latest
  container_name: chainlensapi
  environment:
    - NODE_ENDPOINT=http://rpcnode:8545
    - MONGO_CLIENT_URI=mongodb://chainlensmongodb:27017
    - REINDEX_ENDPOINT=http://chainlensingestion/reindex/
    - MONGO_DB_NAME=epirus
    - MONGO_CREATE_INDICES=true
  depends_on:
    - chainlensmongodb

x-chainlensmongodb-ref:
  &chainlensmongodb-def
  image: mongo:5.0.8
  container_name: chainlensmongodb
  environment:
    - COMPOSE_HTTP_TIMEOUT=900
    - DOCKER_CLIENT_TIMEOUT=900
  entrypoint: mongod --bind_ip "0.0.0.0"

x-chainlensweb-ref:
  &chainlensweb-def
  image: web3labs/epirus-free-web:latest
  container_name: chainlensweb
  environment:
    - API_URL=/api
    - DISPLAY_NETWORK_TAB=disabled
  depends_on:
    - chainlensapi

x-chainlensingestion-ref:
  &chainlensingestion-def
  image: web3labs/epirus-free-ingestion:latest
  container_name: chainlensingestion
  environment:
    - NODE_ENDPOINT=http://rpcnode:8545
    - MONGO_CLIENT_URI=mongodb://chainlensmongodb:27017
    - MONGO_DB_NAME=epirus
  depends_on:
    - chainlensmongodb
    - chainlensweb

x-chainlensnginx-ref:
  &chainlensnginx-def
  image: nginx:latest
  container_name: chainlensnginx
  volumes:
    - ./chainlens/nginx.conf:/etc/nginx/nginx.conf
    - ./chainlens/5xx.html:/www/error_pages/5xx.html
  ports:
    - 8081:80
  depends_on:
    - chainlensapi
    - chainlensweb



x-ethsignerProxy-def:
  &ethsignerProxy-def
  image: consensys/ethsigner:${ETHSIGNER_VERSION:-latest}
  command: [
    "--chain-id=1337",
    "--http-listen-host=0.0.0.0",
    "--downstream-http-port=8545",
    "--downstream-http-host=rpcnode",
    "file-based-signer",
    "-k",
    "/opt/ethsigner/keyfile",
    "-p",
    "/opt/ethsigner/passwordfile"
  ]
  ports:
    - 8545

services:

  sbv:
    << : *besu-def
    ports:
      - 21001:8545/tcp
      - 30303
      - 9545
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=service.name=sbv,service.version=${BESU_VERSION:-latest}
    labels:
      - "consensus=besu"
    volumes:
      - ./config/besu/:/config
      - ./config/nodes/sbv:/opt/besu/keys
      - ./config/tls:/config/tls:ro
      - ./logs/besu:/tmp/besu
    networks:
      quorum-dev-quickstart:
        ipv4_address: 172.16.239.11

  vietcombank:
    << : *besu-def
    ports:
      - 21002:8545/tcp
      - 30303
      - 9545
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=service.name=vietcombank,service.version=${BESU_VERSION:-latest}
    labels:
      - "consensus=besu"
    volumes:
      - ./config/besu/:/config
      - ./config/nodes/vietcombank:/opt/besu/keys
      - ./config/tls:/config/tls:ro
      - ./logs/besu:/tmp/besu
    depends_on:
      - sbv
    networks:
      quorum-dev-quickstart:
        ipv4_address: 172.16.239.12

  vietinbank:
    << : *besu-def
    ports:
      - 21003:8545/tcp
      - 30303
      - 9545
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=service.name=vietinbank,service.version=${BESU_VERSION:-latest}
    labels:
      - "consensus=besu"
    volumes:
      - ./config/besu/:/config
      - ./config/nodes/vietinbank:/opt/besu/keys
      - ./config/tls:/config/tls:ro
      - ./logs/besu:/tmp/besu
    depends_on:
      - sbv
    networks:
      quorum-dev-quickstart:
        ipv4_address: 172.16.239.13

  bidv:
    << : *besu-def
    ports:
      - 21004:8545/tcp
      - 30303
      - 9545
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=service.name=bidv,service.version=${BESU_VERSION:-latest}
    labels:
      - "consensus=besu"
    volumes:
      - ./config/besu/:/config
      - ./config/nodes/bidv:/opt/besu/keys
      - ./config/tls:/config/tls:ro
      - ./logs/besu:/tmp/besu
    depends_on:
      - sbv
    networks:
      quorum-dev-quickstart:
        ipv4_address: 172.16.239.14

  rpcnode:
    << : *besu-def
    container_name: rpcnode
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=service.name=rpcnode,service.version=${BESU_VERSION:-latest}
    volumes:
      - ./config/besu/:/config
      - ./config/nodes/rpcnode:/opt/besu/keys
      - ./config/tls:/config/tls:ro
      - ./logs/besu:/tmp/besu
    depends_on:
      - sbv
    ports:
      - 8545:8545/tcp
      - 8546:8546/tcp
    networks:
      quorum-dev-quickstart:
        ipv4_address: 172.16.239.15
    entrypoint:
      - /bin/bash
      - -c
      - |
        cp "/config/${BESU_CONS_ALGO:-QBFT}genesis.json" /config/genesis.json
        
        # Priority: config.toml > config-tls.toml > /config/config.toml
        if [ -f "/opt/besu/keys/config.toml" ]; then
          CONFIG_FILE="/opt/besu/keys/config.toml"
          echo "Using local configuration (no TLS)"
        elif [ -f "/opt/besu/keys/config-tls.toml" ]; then
          CONFIG_FILE="/opt/besu/keys/config-tls.toml"
          echo "Using TLS configuration"
        else
          CONFIG_FILE="/config/config.toml"
          echo "Using standard configuration"
        fi
        
        /opt/besu/bin/besu \
        --config-file=$$CONFIG_FILE \
        --p2p-host=$$(hostname -i) \
        --rpc-http-api=EEA,WEB3,ETH,NET,TRACE,DEBUG,ADMIN,TXPOOL,PRIV,PERM,${BESU_CONS_ALGO:-QBFT} \
        --rpc-ws-api=EEA,WEB3,ETH,NET,TRACE,DEBUG,ADMIN,TXPOOL,PRIV,PERM,${BESU_CONS_ALGO:-QBFT} ;

  ethsignerProxy:
    << : *ethsignerProxy-def
    volumes:
      - ./config/ethsigner/password:/opt/ethsigner/passwordfile
      - ./config/ethsigner/key:/opt/ethsigner/keyfile
    depends_on:
      - sbv
      - rpcnode
    ports:
      - 18545:8545/tcp
    networks:
      quorum-dev-quickstart:
        ipv4_address: 172.16.239.40

  ksm:
    build:
      context: ../ksm
      dockerfile: Dockerfile
    container_name: ksm-service
    ports:
      - "8080:8080"
    volumes:
      - ./ksm-data:/app/ksm-data  # ✅ Persistent storage for encrypted private keys
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - KSM_STORAGE_DIR=/app/ksm-data  # Storage directory path
    networks:
      quorum-dev-quickstart:
        ipv4_address: 172.16.239.60
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "--proxy", "off", "http://localhost:8080/ksm/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


